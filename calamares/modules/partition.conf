# partition.conf on Firefighterlinux, penguins-eggs 26.3.21
---
efiSystemPartition: /boot/efi
enableLuksAutomatedPartitioning: true
luksGeneration: luks2
userSwapChoices:
  - none
  - file
initialSwapChoice: file
drawNestedPartitions: true
defaultFileSystemType: ext4
availableFileSystemTypes:
  - ext4
  - btrfs
partitionLayout:
  - name: ubuntu_boot
    filesystem: ext4
    noEncrypt: true
    onlyPresentWithEncryption: true
    mountPoint: /boot
    size: 4G
  - name: ubuntu_root
    filesystem: unknown
    mountPoint: /
    size: 100%
