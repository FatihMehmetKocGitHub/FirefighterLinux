# users.conf on Firefighterlinux, penguins-eggs 26.3.21
---
doAutologin: true
setRootPassword: false
sudoersGroup: sudo
defaultGroups:
  - name: adm
    must_exist: true
  - name: cdrom
    must_exist: true
  - name: dip
    must_exist: true
  - name: plugdev
    must_exist: true
  - name: sambashare
    system: true
  - name: sudo
    must_exist: true
userShell: /bin/bash
passwordRequirements:
  nonempty: true
